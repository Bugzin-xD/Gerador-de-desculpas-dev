<!DOCTYPE html>
<html>
    <head>
        <meta charset="utf-8">
        <meta http-equiv="X-UA-Compatible" content="IE=edge">
        <title>Gerador de desculpas dev</title>
        <meta name="viewport" content="width=device-width, initial-scale=1">
    </head>
    <body>
<style>
    body { background: #1a1a1a; color: #00ff00; font-family: 'Courier New', monospace; padding: 20px; }
    .terminal { border: 1px solid #333; background: #000; padding: 15px; border-radius: 5px; min-height: 200px; }
    .prompt { color: #888; }
    .cmd { color: #fff; }
    button { background: #333; color: #fff; border: none; cursor: pointer; padding: 10px; margin-top: 10px; user-select: none; }
    button:hover { background: #444; }
    .title { font-family: 'Courier', sans-serif; text-align: center; text-transform: uppercase; font-weight: bold; letter-spacing: 1.5px; animation: glitch-heavy 3s infinite; display:inline-block; }
    @keyframes glitch-heavy {
        0% { transform: none; clip-path: none; filter: none; }
        1% { transform: translate(-10px, 3px) skew(25deg); clip-path: inset(10% 0 30% 0); filter: invert(1); }
        3% { transform: translate(10px, -3px) skew(-20deg); clip-path: inset(40% 0 10% 0); }
        5% { transform: translate(-15px, 5px); clip-path: inset(80% 0 5% 0); filter: hue-rotate(90deg); }
        7% { transform: none; clip-path: none; filter: none; }
        100% { transform: none; }
    }
    ::selection { color: red; }
</style>

<div id="seu-container"><h1 class="title">Gerador de deculpas pra dev's</h1></div>

<div class="terminal" id="terminal"></div>

<button onclick="gerar()">Gerar Desculpa</button>
<button onclick="copiar()" id="btn">Copiar desculpa</button>

<script>
    const desculpas = [
        "No meu pc funciona ¯\\_(ツ)_/¯",
        "Isso é problema de cache do navegador, certeza.",
        "O estagiário subiu o código errado.",
        "Geralmente o problema tá entre a cadeira e o pc.",
        "Culpa do Tailwind que não carregou.",
        "Foi uma instabilidade momentânea na AWS.",
        "Já tentou desligar e ligar denovo?",
        "Foi a IA que errou...",
        "E dai que deu tudo erro, uma linha disse que executou",
        "Meu trabalho é fazer rodar, não deixar sem erro",
        "Se rodou só não mexer mais",
        "Só usar gitignore",
        "if(chefe_reclama) { return(pior_serviço); } else { return(trabalhador_feliz); }",
        "Não é bug, é um só um easter egg que eu ainda não terminei.",
        "O código estava elegante demais para funcionar de primeira.",
        "Não é bug, é o sistema testando a sua paciência.",
        "O compilador decidiu que hoje ele é um crítico de arte e não gostou da sintaxe.",
        "O código está em período de luto pelo banco de dados que caiu.",
        "O código está em quarentena para evitar que o bug se espalhe.",
        "O código funciona, o usuário é que está usando a lógica errada."
    ];

    let typing = false;

    function gerar() {
        if (typing) return;
        const frase = desculpas[Math.floor(Math.random() * desculpas.length)];
        const terminal = document.getElementById('terminal');
        
        terminal.innerHTML = `<p><span class="prompt">></span> <span id="typing-text"></span></p>`;
        const target = document.getElementById('typing-text');
        
        let i = 0;
        typing = true;

        function type() {
            if (i < frase.length) {
                target.innerHTML += frase.charAt(i);
                i++;
                setTimeout(type, 30);
            } else {
                typing = false;
            }
        }
        type();
    }

    const frase = "Gerador de desculpas dev's";
    const container = document.getElementById('seu-container');
    container.innerHTML = frase.split('').map((letra, i) => {
        return `<h1 class="title">${letra === ' ' ? '&nbsp;' : letra}</h1>`;
    }).join('');

    function copiar() {
        const terminal = document.getElementById('terminal');
        const btn = document.getElementById('btn');
        const texto = terminal.innerText.replace('>', '').trim();

        if (texto) {
            navigator.clipboard.writeText(texto);
            btn.innerText = 'Copiado✔';
            setTimeout(() => { btn.innerText = 'Copiar desculpa'; }, 3000);
        }
    }
</script>

<canvas id="bugCanvas" style="position:fixed; top:0; left:0; z-index:9999; pointer-events:none;"></canvas>

<script>
   const canvas = document.getElementById('bugCanvas');
const ctx = canvas.getContext('2d');

let particles = [];
let explosions = [];
let mouse = { x: -1000, y: -1000 };

class Particle {
    constructor(x, y, isExplosion = false) {
        this.isExplosion = isExplosion;
        if (isExplosion) {
            this.x = x;
            this.y = y;
            const angle = Math.random() * Math.PI * 2;
            const speed = Math.random() * 10 + 5;
            this.vx = Math.cos(angle) * speed;
            this.vy = Math.sin(angle) * speed;
            this.life = 1.0;
        } else {
            this.reset();
        }
    }

    reset() {
        this.x = Math.random() * canvas.width;
        this.y = Math.random() * -canvas.height;
        this.text = Math.random() > 0.5 ? "0" : "1";
        this.speed = Math.random() * 3 + 2;
        this.vx = 0;
        this.vy = 0;
        this.fontSize = 16;
    }

    draw() {
        ctx.font = `bold ${this.isExplosion ? 20 : 16}px monospace`;
        ctx.fillStyle = this.isExplosion ? "#ff0000" : "#00ff00";
        ctx.globalAlpha = this.isExplosion ? this.life : 0.3;
        ctx.fillText(Math.random() > 0.5 ? "0" : "1", this.x, this.y);
    }

    update() {
        if (this.isExplosion) {
            this.x += this.vx;
            this.y += this.vy;
            this.vx *= 0.95;
            this.vy *= 0.95;
            this.life -= 0.02;
        } else {
            this.x += this.vx;
            this.y += this.vy + this.speed;
            this.vx *= 0.92;
            this.vy *= 0.92;
            if (this.y > canvas.height) this.reset();
        }
    }
}

function init() {
    canvas.width = window.innerWidth;
    canvas.height = window.innerHeight;
    particles = [];
    explosions = [];
    for (let i = 0; i < 250; i++) particles.push(new Particle());
}

function animate() {
    ctx.clearRect(0, 0, canvas.width, canvas.height);
    
    particles.forEach(p => {
        p.update();
        p.draw();
    });

    explosions = explosions.filter(e => e.life > 0);
    explosions.forEach(e => {
        e.update();
        e.draw();
    });

    requestAnimationFrame(animate);
}

window.addEventListener('mousemove', (e) => { 
    mouse.x = e.clientX; 
    mouse.y = e.clientY; 
});

window.addEventListener('click', (e) => {
    for (let i = 0; i < 30; i++) {
        explosions.push(new Particle(e.clientX, e.clientY, true));
    }

    particles.forEach(p => {
        const dx = p.x - e.clientX;
        const dy = p.y - e.clientY;
        const dist = Math.sqrt(dx * dx + dy * dy);
        const force = 1200 / (dist + 1); 
        if (dist < 500) {
            p.vx = (dx / dist) * force;
            p.vy = (dy / dist) * force;
        }
    });
});

window.addEventListener('resize', init);
init();
animate();

</script>
</body>
</html>
